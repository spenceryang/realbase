# Render Blueprint — deploy agent as a background worker + web service
services:
  - type: web
    name: realbase-agent
    runtime: node
    region: oregon
    plan: starter # $7/month
    buildCommand: npm install -g pnpm && pnpm install && cd agent && pnpm run build
    startCommand: cd agent && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4021"
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
      - key: AGENT_PRIVATE_KEY
        sync: false
      - key: BUILDER_CODE
        value: realbase
      - key: GREATSCHOOLS_API_KEY
        sync: false
      - key: WALKSCORE_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: SOCRATA_APP_TOKEN
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: PINATA_JWT
        sync: false
      - key: ORACLE_CONTRACT_ADDRESS
        sync: false
      - key: REPORT_CONTRACT_ADDRESS
        sync: false
      - key: AGENT_TICK_INTERVAL_MS
        value: "900000"
    disk:
      name: realbase-data
      mountPath: /data
      sizeGB: 1
